<div class="content">
    <div class="card-um">
        <div class="texto-banner">
            <p class="titulo-banner">ABRA SUA CONTA <br> NO <b style="color: #D4AF37;">BANTADS</b></p>
            <div class="sub-titulo">
                <p>✔ Cadastro rápido</p>
                <p>✔ Aprovação segura</p>
                <p>✔ Conta 100% digital</p>
            </div>

        </div>
        <img src="assets/images/banner.png" alt="">
    </div>
    <div class="card-dois">
        <div class="titulo">
            <p> SOLICITE SUA ABERTURA DE CONTA</p>
            <p class="subtitulo"> Sua solicitação será analisada por um gerente. Você receberá um e-mail após aprovação.
            </p>
        </div>

        <div class="formulario">
            <form #formCadastro="ngForm" (ngSubmit)="cadastrar()">

                <div class="form-group">
                    <div class="flex-1">
                        <label for="nome">Nome Completo *</label>
                        <input type="text" id="nome" name="nome" [(ngModel)]="cliente.nome" required>
                    </div>

                    <div class="flex-1">
                        <label for="email">E-mail *</label>
                        <input type="email" id="email" name="email" [(ngModel)]="cliente.email" required>
                    </div>
                </div>



                <div class="form-group">
                    <div class="flex-1">
                        <label for="cpf">CPF *</label>
                        <input type="text" id="cpf" name="cpf" [(ngModel)]="cliente.cpf" mask="000.000.000-00"
                            [required]="true">

                    </div>
                    <div class="flex-1">
                        <label for="salario">Salário *</label>
                        <input type="text" id="salario" name="salario" [(ngModel)]="cliente.salario" currencyMask
                            [options]="{ prefix: 'R$ ', thousands: '.', decimal: ',', align: 'left' }"
                            [required]="true">
                    </div>

                    <div class="flex-1">
                        <label for="telefone">Telefone *</label>
                        <input type="text" id="telefone" name="telefone" [(ngModel)]="cliente.telefone"
                            mask="(00) 00000-0000" [required]="true">

                    </div>

                </div>



                <div class="form-group">
                    <div class="flex-3">
                        <label for="cep">CEP *</label>
                        <div class="cep-group">
                            <input type="text" id="cep" name="cep" [(ngModel)]="cliente.endereco.cep" mask="00000-000"
                                [required]="true">
                            <button class="btn-cep" (click)="buscarCep()">Buscar CEP</button>
                        </div>

                    </div>



                </div>


                <div class="form-group">
                    <div class="flex-1">
                        <label for="endereco">Endereço *</label>
                        <input type="text" id="endereco" name="endereco" [(ngModel)]="cliente.endereco.rua" required>
                    </div>

                    <div class="flex-3">
                        <label for="numero">Número *</label>
                        <input type="text" id="numero" name="numero" [(ngModel)]="cliente.endereco.numero" required>
                    </div>
                </div>

                <div class="form-group">

                    <div class="flex-1">
                        <label for="complemento">Complemento</label>
                        <input type="text" id="complemento" name="complemento"
                            [(ngModel)]="cliente.endereco.complemento">

                    </div>
                    <div class="flex-2">
                        <label for="bairro">Bairro *</label>
                        <input type="text" id="bairro" name="bairro" [(ngModel)]="cliente.endereco.bairro" required>
                    </div>
                    <div class="flex-2">
                        <label for="cidade">Cidade *</label>
                        <input type="text" id="cidade" name="cidade" [(ngModel)]="cliente.endereco.cidade" required>
                    </div>
                    <div class="flex-2">
                        <label for="estado">Estado *</label>
                        <input type="text" id="estado" name="estado" [(ngModel)]="cliente.endereco.estado" required>
                    </div>
                </div>



                <button class="btn" [disabled]="!formCadastro.valid">Abrir Conta</button>

            </form>

        </div>

    </div>

</div>
