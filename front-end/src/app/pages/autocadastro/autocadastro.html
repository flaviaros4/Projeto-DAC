<div class="content">
    <div class="card-um">
        <div class="texto-banner">
            <p class="titulo-banner">ABRA SUA CONTA <br> NO <b style="color: #D4AF37;">BANTADS</b></p>
            <div class="sub-titulo">
                <p>✔ Cadastro rápido</p>
                <p>✔ Aprovação segura</p>
                <p>✔ Conta 100% digital</p>
            </div>

        </div>
        <img src="assets/images/banner.png" alt="">
    </div>
    <div class="card-dois">
        <div class="titulo">
            <p> SOLICITE SUA ABERTURA DE CONTA</p>
            <p class="subtitulo"> Sua solicitação será analisada por um gerente. Você receberá um e-mail após aprovação.
            </p>
        </div>

        <div class="formulario">
            <form>

                <div class="form-group">
                    <div class="flex-1">
                        <label for="nome">Nome Completo</label>
                        <input type="text" id="nome" name="nome" required>
                    </div>

                    <div class="flex-1">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                </div>



                <div class="form-group">
                    <div class="flex-1">
                        <label for="salario">Salário</label>
                        <input type="number" id="salario" name="salario" required>
                    </div>

                    <div class="flex-1">
                        <label for="telefone">Telefone</label>
                        <input type="text" id="telefone" name="telefone" required>

                    </div>
                    <div class="flex-1">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" name="cpf" required>

                    </div>
                </div>



                <div class="form-group">
                    <div class="flex-3">
                        <label for="cep">CEP</label>
                        <div class="cep-group">
                            <input type="text" id="cep" name="cep" required>
                            <button class="btn-cep">Buscar CEP</button>
                        </div>

                    </div>



                </div>


                <div class="form-group">
                    <div class="flex-1">
                        <label for="endereco">Endereço</label>
                        <input type="text" id="endereco" name="endereco" required>
                    </div>

                    <div class="flex-3">
                        <label for="numero">Número</label>
                        <input type="text" id="numero" name="numero" required>
                    </div>
                </div>

                <div class="form-group">

                    <div class="flex-1">
                        <label for="complemento">Complemento</label>
                        <input type="text" id="complemento" name="complemento">


                    </div>
                    <div class="flex-2">
                        <label for="cidade">Cidade</label>
                        <input type="text" id="cidade" name="cidade" required>
                    </div>
                    <div class="flex-2">
                        <label for="estado">Estado </label>
                        <input type="text" id="estado" name="estado" required>
                    </div>
                </div>





            </form>
            <button class="btn">Abrir Conta</button>
        </div>

    </div>

</div>
