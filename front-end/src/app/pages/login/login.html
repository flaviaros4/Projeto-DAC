

<div id="espaco"></div>
<div id="container">
    <div id="logo">
        <img src="assets/images/undraw_enter_nwx3.png" alt="">
       
        <p>Faça login na <span>BANTADS</span> digitando seu E-mail e senha!</p>
    </div>
    <div id="bloco">
        <form action="validar.ts">
            <div class="campo">
                <label for="email">Email:</label>
                <input type="email" name="email" id="email" placeholder="joao@gmail.com">
            </div>
    
            <div class="campo">
                <label for="senha">Senha:</label>
                <input type="password" name="senha" id="senha" placeholder="******">
            </div>
    
            <input type="submit" value="Logar" id="botao">
        </form>
    </div>
</div>
